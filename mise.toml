[tools]
gitleaks = "latest"
prek = "latest"
python = "3.13"
ruff = "latest"
rumdl = "latest"
shellcheck = "latest"
ty = "latest"
uv = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[hooks]
enter = "bash ./scripts/enter_project.sh"

[env]
_.file = ".env"       # for sensitive data
UV_LINK_MODE = "copy"

[tasks.gen]
run = "uv run -m hyp3r00t"
description = "Generate the README file"
