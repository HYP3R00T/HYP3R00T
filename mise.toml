[tools]
python = "3.13"
uv = "latest"
ty = "latest"
ruff = "latest"
prek = "latest"
gitleaks = "latest"
shellcheck = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[hooks]
enter = "bash ./scripts/enter_project.sh"

[env]
_.file = ".env"       # for sensitive data
UV_LINK_MODE = "copy"
