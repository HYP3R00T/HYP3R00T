# The README renders top-to-bottom in this order. Comment out (or remove)
# a line to disable that instance.
order:
  - intro
  - main_badges
  - personal_blog
  - main_youtube

# Each instance declares its type via the `type:` field. The catalog of
# supported types lives in src/hyp3r00t/config.py:
#   - raw       : static markdown, read from `path:` or inline `content:`
#   - banner    : hero image + alt text
#   - badges    : list of Shields.io badge URLs
#   - social    : list of social media profile links
#   - blog      : dynamic — latest posts from an RSS feed
#   - youtube   : dynamic — latest videos from a YouTube channel
